name: review-public-api
description: A/B eval for the review-public-api skill.
type: capability
defaults:
  runs: 5
  timeout: 420s
  model: claude-opus-4.6
  judge_model: claude-opus-4.6
scoring:
  weights:
    output-matches: 0.3
    prompt: 0.7
  threshold: 0.6
stimuli:
- name: Review a media-component suite (Image/Video/FileDownload)
  prompt: |
    Review this proposed public API for an ASP.NET Core web UI framework. It adds a suite of components that
    render images/videos and trigger downloads from non-HTTP sources (byte arrays, streams, DB BLOBs)
    via streaming JS interop and the browser Cache Storage API, in a new package
    Microsoft.AspNetCore.Components.Media:

      public class MediaSource {
        public MediaSource(byte[] data, string mimeType, string cacheKey);
        public MediaSource(Stream stream, string mimeType, string cacheKey);
        public string CacheKey { get; } public long? Length { get; }
        public string MimeType { get; } public Stream Stream { get; }
      }
      public class MediaContext { public ElementReference Element { get; set; } public bool HasError { get; } public bool IsLoading { get; } public string? ObjectUrl { get; } }
      public abstract class MediaComponentBase : ComponentBase, IAsyncDisposable {
        public Dictionary<string, object>? AdditionalAttributes { get; set; }
        public MediaSource Source { get; set; } public ValueTask DisposeAsync();
      }
      public class Image : MediaComponentBase { public RenderFragment<MediaContext>? ChildContent { get; set; } }
      public class Video : MediaComponentBase { public RenderFragment<MediaContext>? ChildContent { get; set; } }
      public class FileDownload : ComponentBase { public RenderFragment<FileDownloadContext>? ChildContent { get; set; } public string FileName { get; set; } public string? Text { get; set; } }
      public class FileDownloadContext { public string FileName { get; } public Task InvokeAsync(); }

    Usage shows e.g. an Image whose Source is a new MediaSource(photoBytes, "image/jpeg", "photo-42"),
    and a FileDownload whose Source is a new MediaSource(pdfData, "application/pdf", "report") with a
    FileName and Text. Is this the right shape? What would you change?
  graders:
  - type: output-matches
    config:
      pattern: (?i)(seal|sealed)
  - type: output-matches
    config:
      pattern: (?i)(parameter|cancellationtoken|IReadOnly|IDictionary|cachekey|\bid\b)
  - type: prompt
  - type: pairwise
  rubric:
  - Recommends sealing the concrete component/options/DTO/context types unless extensibility is justified
  - 'Reasons about where the input data and the cacheKey actually come from (e.g. blob storage / database / uploads usually already provide a stable id), and concludes the required key is not real friction: keep it, make it easy to pass, and do NOT synthesize one expensively (e.g. hashing the whole stream)'
  - Flags that these components rely on JS interop and are therefore inert when the app is server-rendered without client interactivity, or otherwise scopes the 'consumable from any renderer' claim
  - 'Catches at least one concrete shape bug: the FileDownload usage uses Source but the API declares none; and/or component parameters lack [Parameter]; and/or AdditionalAttributes should be an IReadOnlyDictionary, not a concrete Dictionary'
  - Suggests a CancellationToken on the async download/operation
  - Reaches a 'changes recommended' verdict and treats the feature itself as justified (long-requested, no good workaround)
- name: Review a server-to-client configuration model for a web app
  prompt: |
    Review this proposed public API for an ASP.NET Core web UI framework. It flows configuration from the server
    to the browser client via an HTML comment, across server-rendered and browser/client execution:

      namespace Microsoft.AspNetCore.Components;
      public class BrowserConfiguration {
        public int? LogLevel { get; set; }
        public ServerBrowserOptions Server { get; set; }
        public SsrBrowserOptions Ssr { get; set; }
        public WebAssemblyBrowserOptions WebAssembly { get; set; }
      }
      public class ServerBrowserOptions { public string? ReconnectionDialogId { get; set; } public int? ReconnectionMaxRetries { get; set; } public int? ReconnectionRetryIntervalMilliseconds { get; set; } }
      public class SsrBrowserOptions { public int? CircuitInactivityTimeoutMs { get; set; } public bool? DisableDomPreservation { get; set; } }
      public class WebAssemblyBrowserOptions { public string? ApplicationCulture { get; set; } public string? EnvironmentName { get; set; } public Dictionary<string, string> EnvironmentVariables { get; set; } }
      public class ConfigureBrowser : ComponentBase { public BrowserConfiguration Configuration { get; set; } public HttpContext? HttpContext { get; set; } }

      namespace Microsoft.AspNetCore.Http;
      public static class BrowserConfigurationHttpContextExtensions { public static BrowserConfiguration GetBrowserConfiguration(this HttpContext context); }

      namespace Microsoft.AspNetCore.Builder;
      public static class RazorComponentsEndpointConventionBuilderExtensions {
        public static RazorComponentsEndpointConventionBuilder WithBrowserConfiguration(this RazorComponentsEndpointConventionBuilder builder, Action<BrowserConfiguration> configure);
      }

    Usage sets values like LogLevel = 2 (meaning Warning) and Server.ReconnectionMaxRetries = 10.
    Critique the shape and propose changes.
  graders:
  - type: output-matches
    config:
      pattern: (?i)(loglevel|enum)
  - type: output-matches
    config:
      pattern: (?i)(seal|sealed|TimeSpan|init|IReadOnly|parameter|namespace)
  - type: prompt
  - type: pairwise
  rubric:
  - Flags that LogLevel typed as int? lets callers pass magic numbers and should be a strongly-typed enum (the existing LogLevel enum)
  - Recommends sealing the configuration/options classes and renaming toward the Options convention (e.g. BrowserOptions) consistent with the rest of ASP.NET Core
  - Identifies the nested Server/Ssr/WebAssembly sub-objects must be initialized (non-null) so the shown usage (Server.X = ...) doesn't null-reference, a common-path pit of failure
  - Flags duration values expressed as int milliseconds should be TimeSpan, and/or the concrete Dictionary should be a non-null map interface, and/or the component parameters need [Parameter]
  - 'Reasons about the HttpContext accessor extension: a feature-specific HttpContext helper should NOT sit in the broad Microsoft.AspNetCore.Http namespace (it would surface on every HttpContext); the endpoint-builder With* extension in Microsoft.AspNetCore.Builder is correctly placed'
  - Reaches a 'changes recommended' verdict and treats the feature as a justified common end-developer need
- name: Review URL-driven sort/pagination state for a data grid
  prompt: |
    Review this proposed public API change for ASP.NET Core's QuickGrid data-grid component. Today sort column,
    sort direction, and page index live in memory, so the grid is broken when the app is server-rendered without
    interactivity (sorting and paging rely on @onclick which the static renderer doesn't wire up) and the state isn't bookmarkable.
    The change persists sort/page state in URL query parameters (?sort=...&order=...&page=...); when
    enabled (the default) headers and paginator controls render as <a> links instead of <button>.
    The stated GOAL is that sort/page state be bookmarkable, shareable via URL, and stable across navigation.

      namespace Microsoft.AspNetCore.Components.QuickGrid;
      public partial class QuickGrid<TGridItem> {
        public string QueryParameterNamePrefix { get; set; } = "";   // [Parameter]
        protected override void OnInitialized();
      }
      public partial class Paginator {
        protected override void OnInitialized();
        protected override Task OnParametersSetAsync();   // replaces the previous: protected override void OnParametersSet();
      }

    Notes: QueryParameterNamePrefix defaults to "" so multiple grids on one page share parameters unless
    a developer sets distinct prefixes; the ?sort= value is the column's Title string; the <button>-to-<a>
    change and the OnParametersSet-to-OnParametersSetAsync change are both called out as breaking. There's an
    AppContext switch to opt out. Critique the shape.
  graders:
  - type: output-matches
    config:
      pattern: (?i)(title|sort|prefix|default)
  - type: output-matches
    config:
      pattern: (?i)(breaking|override|bookmark|stable)
  - type: prompt
  - type: pairwise
  rubric:
  - Concludes the empty-string QueryParameterNamePrefix default is acceptable because one grid per page is the common case and multi-grid is a rarer opt-in scenario, and does NOT recommend auto-generating a prefix (which would defeat the bookmarkable/stable-URL goal)
  - Identifies that keying the sort query value on the column's display Title is fragile (renames and localization break shared/bookmarked URLs; title-less columns can't sort) and proposes a stable, opt-in column identifier with Title as fallback
  - Recognizes the OnParametersSet -> OnParametersSetAsync change is behaviorally breaking for subclasses, and/or that these protected lifecycle overrides are implementation details rather than genuinely new public API surface
  - Treats the default button-to-link rendering change as a breaking default change that needs an escape hatch and a major version (the AppContext opt-out is the right mechanism)
  - Affirms what is already right rather than inventing problems (e.g. the prefix name, the async lifecycle name being an existing-contract exception, the AppContext mechanism), and reaches a coherent verdict
- name: Expand a shipped default API convention with a new status code
  prompt: |
    In ASP.NET Core MVC, DefaultApiConventions.Post documents 201 and 400 response codes but not 409
    Conflict, which is common for POST when a resource already exists. I'd like to add 409 to the
    built-in DefaultApiConventions.Post convention so it's covered by default for everyone. Can we make
    this change to the shipped default convention?
  graders:
  - type: output-matches
    config:
      pattern: (?i)(breaking|default|custom|convention)
  - type: prompt
  - type: pairwise
  rubric:
  - Identifies that changing a shipped, on-by-default convention is a breaking change to existing behavior for every consumer
  - Recommends against modifying the built-in default convention
  - Points the requester to defining their own custom API conventions instead
- name: Add CancellationToken to a shipped public interface (ITicketStore)
  prompt: |
    I'm proposing a change to the public ITicketStore interface in ASP.NET Core cookie authentication.
    Its four async methods don't accept a CancellationToken, so callers can't cancel store I/O:

      public interface ITicketStore {
        Task<string> StoreAsync(AuthenticationTicket ticket);
        Task RenewAsync(string key, AuthenticationTicket ticket);
        Task<AuthenticationTicket?> RetrieveAsync(string key);
        Task RemoveAsync(string key);
      }

    I want to add CancellationToken to each method. Review this as an API change: is it a good idea,
    and what exact shape should it take?
  graders:
  - type: output-matches
    config:
      pattern: (?i)cancellationtoken
  - type: output-matches
    config:
      pattern: (?i)(default interface|default implementation|overload|breaking|binary)
  - type: prompt
  - type: pairwise
  rubric:
  - Supports adding CancellationToken support to the async methods
  - Recognizes ITicketStore is a public interface with external implementers, so adding members outright is a binary-breaking change
  - 'Recommends a non-breaking shape: default interface methods that delegate to the existing methods (or new overloads), rather than changing the existing signatures'
  - Notes the CancellationToken should be the last parameter and flowed through
