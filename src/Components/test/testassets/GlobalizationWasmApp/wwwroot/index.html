<!DOCTYPE html>
<head>
    <base href="/subdir/" />
    <style>
        #blazor-error-ui { display: none }
    </style>
</head>
<body>
    <div id="blazor-error-ui">Error</div>
    <app>Loading...</app>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        (function(){
            const search = new window.URLSearchParams(window.location.search);
            const culture = search.get('culture');
            Blazor.start({
                applicationCulture: culture,
                // GOTCHA: Workaround until https://github.com/dotnet/runtime/pull/129221
                configureRuntime: dotnet => {
                    if (culture) {
                        dotnet.withEnvironmentVariable('LANG', `${culture}.UTF-8`);
                    }
                }
            });
        })();

    </script>
</body>

</html>
