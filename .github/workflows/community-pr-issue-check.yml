name: Community PR issue check

on:
  pull_request_target:
    types:
      - labeled

permissions:
  issues: write
  pull-requests: write

jobs:
  check-associated-issue:
    if: >-
      ${{
        github.repository_owner == 'dotnet' &&
        github.event.label.name == 'community-contribution' &&
        github.event.pull_request.user.type != 'Bot'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Check for an associated issue
        id: check-issue
        env:
          GH_TOKEN: ${{ github.token }}
          # Supported issue references include keyword-based links like
          # "Fixes #123" or "Related to #123".
          ISSUE_KEYWORDS: >-
            fix|fixes|fixed|fixing|close|closes|closed|closing|resolve|resolves|resolved|resolving|ref|refs|related to|relates to
          PR_BODY: ${{ github.event.pull_request.body }}
          REPOSITORY: ${{ github.repository }}
        run: |
          normalized_pr_body=$(printf '%s' "$PR_BODY" | tr '\n' ' ')
          issue_keyword_pattern="($ISSUE_KEYWORDS)[[:space:]]*:?[[:space:]]*#[0-9]+"
          issue_url_pattern="https://github\\.com/${REPOSITORY//\//\\/}/issues/[0-9]+"

          issue_numbers="$(
            {
              printf '%s' "$normalized_pr_body" | grep -oiE "$issue_keyword_pattern" | grep -oE '[0-9]+'
              printf '%s' "$normalized_pr_body" | grep -oiE "$issue_url_pattern" | grep -oE '[0-9]+'
            } | sort -u
          )"

          while IFS= read -r issue_number; do
            if [ -z "$issue_number" ]; then
              continue
            fi

            if ! issue_check_result=$(gh api "repos/$REPOSITORY/issues/$issue_number" --jq '(.pull_request == null) and (.state == "open")' 2>&1); then
              echo "::error::Failed to fetch or validate issue #$issue_number in $REPOSITORY."
              exit 1
            fi

            if [ "$issue_check_result" = "true" ]; then
              echo "has_issue=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done <<EOF
          $issue_numbers
          EOF

          echo "has_issue=false" >> "$GITHUB_OUTPUT"

      - name: Comment when no associated issue is linked
        if: steps.check-issue.outputs.has_issue == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          COMMENT_BODY="$(
            cat <<'EOF'
          👋 Hi @__AUTHOR__, thanks for your contribution!

          Community pull requests in `dotnet/aspnetcore` need to have an associated issue before we can review them.

          Please update the pull request description to link the issue. For example: Fixes #123

          If an issue does not exist yet, please open one first: https://github.com/__REPOSITORY__/issues/new/choose

          For more details, see:
          - https://github.com/__REPOSITORY__/blob/__BASE_REF__/CONTRIBUTING.md
          - https://github.com/__REPOSITORY__/blob/__BASE_REF__/.github/pull_request_template.md
          EOF
          )"
          COMMENT_BODY="${COMMENT_BODY//__AUTHOR__/$AUTHOR}"
          COMMENT_BODY="${COMMENT_BODY//__REPOSITORY__/$REPOSITORY}"
          COMMENT_BODY="${COMMENT_BODY//__BASE_REF__/$BASE_REF}"

          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body "$COMMENT_BODY"
