name: "Milestone Changelog Generator"
"on":
  schedule:
  - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: Agent caller context (used internally by Agentic Workflows).
        required: false
        type: string

permissions: {}

concurrency:
  group: "gh-aw-${{ github.workflow }}"

run-name: "Milestone Changelog Generator"

env:
  BATCH_SIZE: "20"
  MILESTONE: 11.0-preview5
  PRODUCT: ASP.NET Core
  REPO: dotnet/aspnetcore

jobs:
  activation:
    runs-on: ubuntu-slim
    permissions:
      actions: read
      contents: read
    outputs:
      comment_id: ""
      comment_repo: ""
      engine_id: ${{ steps.generate_aw_info.outputs.engine_id }}
