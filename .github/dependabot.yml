updates:
- directory: /
  open-pull-requests-limit: 0
  package-ecosystem: nuget
  schedule:
    interval: weekly
- commit-message:
    include: scope
    prefix: "[main] "
  directory: /
  ignore:
  - dependency-name: "martincostello*"
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - area-infrastructure
  package-ecosystem: github-actions
  schedule:
    day: friday
    interval: weekly
    time: "05:00"
    timezone: America/Los_Angeles
- allow:
  - dependency-type: all
  commit-message:
    include: scope
    prefix: "[main] "
  directory: /
  labels:
  - area-infrastructure
  package-ecosystem: gitsubmodule
  schedule:
    day: friday
    interval: weekly
    time: "05:00"
    timezone: America/Los_Angeles
- allow:
  - dependency-type: all
  commit-message:
    include: scope
    prefix: "[release/2.3] "
  directory: /
  labels:
  - area-infrastructure
  package-ecosystem: gitsubmodule
  schedule:
    interval: monthly
  target-branch: release/2.3
- allow:
  - dependency-type: all
  commit-message:
    include: scope
    prefix: "[release/8.0] "
  directory: /
  labels:
  - area-infrastructure
  package-ecosystem: gitsubmodule
  schedule:
    interval: monthly
  target-branch: release/8.0
- allow:
  - dependency-type: all
  commit-message:
    include: scope
    prefix: "[release/9.0] "
  directory: /
  labels:
  - area-infrastructure
  package-ecosystem: gitsubmodule
  schedule:
    interval: monthly
  target-branch: release/9.0
- allow:
  - dependency-type: all
  commit-message:
    include: scope
    prefix: "[release/10.0] "
  directory: /
  labels:
  - area-infrastructure
  package-ecosystem: gitsubmodule
  schedule:
    interval: monthly
  target-branch: release/10.0
version: 2
